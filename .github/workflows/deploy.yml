# GitHub Actions: ConoHa VPSへの自動デプロイ
# mainブランチへのpush時にVPSへ自動デプロイを実行
# - 詳細ログ出力
# - 失敗時のDiscord通知
# - ヘルスチェック

name: Deploy to ConoHa VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/boyscout-tajimi
  APP_NAME: boyscout-tajimi
  SITE_URL: https://www.tajimibs.org

jobs:
  build:
    name: 🧪 Build Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 📦 Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 依存関係インストール
        run: npm ci

      - name: 🔨 ビルド・構文チェック
        run: npm run build

      - name: ✅ 構文チェック (Server)
        run: node --check src/server/server.js

      - name: ❌ ビルド失敗通知 (Discord)
        if: failure()
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ ビルド失敗\",
                \"description\": \"**${{ env.APP_NAME }}** のビルドテストでエラーが発生しました。デプロイを中止します。\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"コミット\", \"value\": \"[\`${COMMIT_SHORT}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA})\", \"inline\": true},
                  {\"name\": \"実行者\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"ログ\", \"value\": \"[Actions ログを確認](${RUN_URL})\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"GitHub Actions - Build Check\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" || true

  deploy:
    name: 🚀 Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4


      - name: 🔑 SSHキーをセットアップ
        id: ssh_setup
        run: |
          set -e
          echo "::group::SSH設定"
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          echo "✅ SSHキー設定完了"
          echo "::endgroup::"

      - name: 🚀 VPSへデプロイ
        id: deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            deploy@${{ secrets.VPS_HOST }} << 'ENDSSH'
              set -euo pipefail
              
              echo "=========================================="
              echo "🚀 デプロイ開始: $(date '+%Y-%m-%d %H:%M:%S')"
              echo "=========================================="
              
              cd /var/www/boyscout-tajimi
              NPM_CI_FAILED=0
              
              # Step 1: Git fetch
              echo ""
              echo "📦 [1/5] 最新コードを取得中..."
              git fetch origin main
              CURRENT_COMMIT=$(git rev-parse --short HEAD)
              git reset --hard origin/main
              NEW_COMMIT=$(git rev-parse --short HEAD)
              echo "   ✅ 更新完了: $CURRENT_COMMIT → $NEW_COMMIT"
              
              # Step 2: npm install
              echo ""
              echo "📦 [2/5] 依存関係をインストール中..."
              if npm ci --omit=dev; then
                echo "   ✅ npm ci 完了"
              else
                NPM_CI_FAILED=1
                echo "   ⚠️ npm ci に失敗しました。既存の node_modules で復旧を試行します。"
              fi
              
              # Step 3: Build
              echo ""
              echo "🔨 [3/5] ビルド実行中..."
              npm run build
              echo "   ✅ ビルド完了"
              
              # Step 4: PM2 restart
              echo ""
              echo "🔄 [4/5] アプリケーション再起動中..."
              pm2 restart boyscout-tajimi --update-env
              sleep 3
              pm2 status boyscout-tajimi
              echo "   ✅ PM2再起動完了"
              
              # Step 5: Health check
              echo ""
              echo "🏥 [5/5] ヘルスチェック中..."
              # 起動待機
              sleep 5
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ --max-time 10) || HTTP_STATUS="000"
              
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "   ✅ サーバー応答OK (HTTP $HTTP_STATUS)"
              else
                echo "   ❌ サーバー応答エラー: HTTP $HTTP_STATUS"
                echo "::group::📊 アプリケーションログ (直近50行)"
                echo "--- Error Log ---"
                pm2 logs boyscout-tajimi --lines 50 --err --nostream
                echo ""
                echo "--- Output Log ---"
                pm2 logs boyscout-tajimi --lines 50 --out --nostream
                echo "::endgroup::"
                exit 1
              fi
              
              DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S')
              echo ""
              echo "=========================================="
              echo "✅ デプロイ完了: $DEPLOY_TIME"
              echo "   コミット: $NEW_COMMIT"
              echo "=========================================="

              if [ "$NPM_CI_FAILED" = "1" ]; then
                echo "⚠️ 依存関係の再インストールに失敗しました。VPS 上の権限を修正してください。"
                exit 1
              fi
              
              # 環境変数として出力（後続ステップで使用）
              echo "DEPLOY_TIME=$DEPLOY_TIME" >> /tmp/deploy_env
              echo "NEW_COMMIT=$NEW_COMMIT" >> /tmp/deploy_env
          ENDSSH

      - name: ✅ 成功通知 (Discord)
        if: success()
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          ACTOR="${{ github.actor }}"
          
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ デプロイ成功\",
                \"description\": \"**${{ env.APP_NAME }}** が正常にデプロイされました\",
                \"color\": 5763719,
                \"fields\": [
                  {\"name\": \"コミット\", \"value\": \"[\`${COMMIT_SHORT}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA})\", \"inline\": true},
                  {\"name\": \"実行者\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"メッセージ\", \"value\": \"${COMMIT_MSG:0:100}\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" || true

      - name: ❌ 失敗通知 (Discord)
        if: failure()
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT_SHA:0:7}"
          ACTOR="${{ github.actor }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ デプロイ失敗\",
                \"description\": \"**${{ env.APP_NAME }}** のデプロイに失敗しました\",
                \"color\": 15158332,
                \"fields\": [
                  {\"name\": \"コミット\", \"value\": \"[\`${COMMIT_SHORT}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA})\", \"inline\": true},
                  {\"name\": \"実行者\", \"value\": \"${ACTOR}\", \"inline\": true},
                  {\"name\": \"ログ\", \"value\": \"[Actions ログを確認](${RUN_URL})\", \"inline\": false}
                ],
                \"footer\": {\"text\": \"GitHub Actions\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" || true

      - name: 🧹 クリーンアップ
        if: always()
        run: rm -f ~/.ssh/deploy_key
